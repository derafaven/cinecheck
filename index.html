<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CineCheck — Buscador Multi-Sitio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#080a0f;--s1:#0d0f16;--bd2:#242840;--ac:#e8c14a;--tx:#e2e4ee;--mu:#4e5470;--mu2:#7880a0;--gr:#2ecc71;--rd:#e74c3c;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 40% at 50% -10%,rgba(232,193,74,.06),transparent 60%);pointer-events:none;z-index:0;}
.hero{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;padding:72px 20px 48px;text-align:center;}
.tag{display:inline-block;font-size:10px;font-weight:500;letter-spacing:4px;text-transform:uppercase;color:var(--ac);border:1px solid rgba(232,193,74,.25);padding:5px 14px;border-radius:2px;margin-bottom:24px;animation:fu .6s ease both;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:clamp(60px,13vw,130px);line-height:.88;color:var(--tx);animation:fu .7s ease both;}
.logo span{color:var(--ac);}
.sub{color:var(--mu2);font-size:15px;font-weight:300;margin:12px 0 44px;animation:fu .8s ease both;}
.sw{width:100%;max-width:600px;animation:fu .9s ease both;}
.sb{display:flex;background:var(--s1);border:1px solid var(--bd2);border-radius:5px;overflow:hidden;transition:border-color .2s,box-shadow .2s;}
.sb:focus-within{border-color:var(--ac);box-shadow:0 0 0 3px rgba(232,193,74,.08);}
#qi{flex:1;background:transparent;border:none;outline:none;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:16px;padding:17px 22px;}
#qi::placeholder{color:var(--mu);}
#qb{background:var(--ac);color:#000;border:none;cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;padding:0 28px;transition:background .15s,transform .1s;flex-shrink:0;}
#qb:hover{background:#f5d060;}
#qb:active{transform:scale(.98);}
#qb:disabled{background:var(--mu);cursor:not-allowed;}
#res{width:100%;max-width:600px;margin-top:32px;position:relative;z-index:1;}

.loading{display:flex;align-items:center;gap:14px;color:var(--mu2);font-size:14px;padding:20px 4px;animation:fu .3s ease both;}
.sp{width:20px;height:20px;border:2px solid var(--bd2);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0;}

.not-found{display:flex;align-items:center;gap:16px;padding:20px 24px;background:rgba(231,76,60,.07);border:1px solid rgba(231,76,60,.2);border-radius:6px;animation:fu .35s ease both;}
.nf-icon{font-size:26px;flex-shrink:0;}
.nf-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--rd);}
.nf-sub{font-size:13px;color:var(--mu2);margin-top:3px;}

.results-wrap{display:flex;flex-direction:column;gap:8px;animation:fu .35s ease both;}
.result-link{display:flex;align-items:center;gap:12px;padding:16px 22px;background:var(--s1);border:1px solid var(--bd2);border-radius:6px;text-decoration:none;color:var(--tx);transition:border-color .2s,background .2s;}
.result-link:hover{border-color:var(--ac);background:rgba(232,193,74,.04);}
.result-check{font-size:18px;flex-shrink:0;}
.result-name{font-size:15px;font-weight:500;flex:1;}
.result-arr{color:var(--mu2);font-size:18px;transition:transform .2s;}
.result-link:hover .result-arr{transform:translateX(3px);color:var(--ac);}

.err{background:rgba(231,76,60,.08);border:1px solid rgba(231,76,60,.2);color:#e87060;padding:14px 18px;border-radius:5px;font-size:14px;animation:fu .3s ease both;}
footer{text-align:center;color:var(--mu);font-size:11px;padding:50px 20px 32px;position:relative;z-index:1;letter-spacing:.5px;}
footer a{color:rgba(232,193,74,.35);text-decoration:none;}
footer a:hover{color:var(--ac);}
@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="hero">
  <div class="tag">Buscador Multi-Sitio</div>
  <div class="logo">CINE<span>CHECK</span></div>
  <p class="sub">Verifica si una película o serie está disponible en múltiples sitios</p>
  <div class="sw">
    <div class="sb">
      <input type="text" id="qi" placeholder="Ej: Avengers, Breaking Bad, El Padrino..." autocomplete="off">
      <button id="qb" onclick="buscar()">BUSCAR</button>
    </div>
  </div>
  <div id="res"></div>
</div>
<footer>CineCheck &nbsp;·&nbsp; <a href="admin/">Panel Admin</a></footer>
<script>
const qi=document.getElementById('qi'),res=document.getElementById('res'),qb=document.getElementById('qb');
qi.addEventListener('keydown',e=>{if(e.key==='Enter')buscar();});
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function buscar(){
  const q=qi.value.trim();
  if(!q){qi.focus();return;}
  qb.disabled=true;
  res.innerHTML=`<div class="loading"><div class="sp"></div>Buscando <strong style="color:var(--tx)">"${esc(q)}"</strong>...</div>`;
  fetch('buscar.php?q='+encodeURIComponent(q))
    .then(r=>r.json()).then(d=>render(d,q))
    .catch(e=>{res.innerHTML=`<div class="err">Error de conexión: ${esc(e.message)}</div>`;})
    .finally(()=>{qb.disabled=false;});
}

function render(data,q){
  if(data.error){res.innerHTML=`<div class="err">${esc(data.error)}</div>`;return;}

  const encontrados=data.resultados.filter(r=>r.encontrada && r.total>0);

  if(encontrados.length===0){
    res.innerHTML=`<div class="not-found">
      <div class="nf-icon">❌</div>
      <div>
        <div class="nf-title">No encontrada en ningún sitio</div>
        <div class="nf-sub">Sin resultados para "<strong>${esc(q)}</strong>" en ${data.sitios_consultados} sitio(s) consultados.</div>
      </div>
    </div>`;
    return;
  }

  let html='<div class="results-wrap">';
  encontrados.forEach(r=>{
    const url=esc(r.url_base+'/?s='+encodeURIComponent(q));
    html+=`<a class="result-link" href="${url}" target="_blank">
      <span class="result-check">✅</span>
      <span class="result-name">${esc(r.nombre)}</span>
      <span class="result-arr">›</span>
    </a>`;
  });
  html+='</div>';
  res.innerHTML=html;
}
</script>
</body>
</html>
